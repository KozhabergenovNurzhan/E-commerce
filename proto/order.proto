syntax = "proto3";

package ecommerce.order.v1;

option go_package = "github.com/KozhabergenovNurzhan/E-commerce/internal/grpc/pb";

// OrderService handles order lifecycle management.
service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderMessage);
  rpc GetOrder(GetOrderRequest) returns (OrderMessage);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}

message OrderItemMessage {
  int64  id         = 1;
  int64  order_id   = 2;
  int64  product_id = 3;
  int32  quantity   = 4;
  double unit_price = 5;
}

message OrderMessage {
  int64                    id          = 1;
  int64                    user_id     = 2;
  int64                    address_id  = 3;  // 0 means no address
  string                   status      = 4;
  double                   total_price = 5;
  int64                    created_at  = 6;
  int64                    updated_at  = 7;
  repeated OrderItemMessage items       = 8;
}

message CreateOrderItemRequest {
  int64 product_id = 1;
  int32 quantity   = 2;
}

message CreateOrderRequest {
  int64                         address_id = 1;  // 0 means no address
  repeated CreateOrderItemRequest items      = 2;
}

message GetOrderRequest {
  int64 id = 1;
}

message ListOrdersRequest {
  int32 page  = 1;
  int32 limit = 2;
}

message ListOrdersResponse {
  repeated OrderMessage orders = 1;
  int32                 total  = 2;
  int32                 page   = 3;
  int32                 limit  = 4;
}

message UpdateOrderStatusRequest {
  int64  id     = 1;
  string status = 2;  // confirmed | shipping | delivered
}

message UpdateOrderStatusResponse {}

message CancelOrderRequest {
  int64 id = 1;
}

message CancelOrderResponse {}

syntax = "proto3";

package ecommerce.product.v1;

option go_package = "github.com/KozhabergenovNurzhan/E-commerce/internal/grpc/pb";

// ProductService handles product catalog and category management.
service ProductService {
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc GetProduct(GetProductRequest) returns (ProductMessage);
  rpc CreateProduct(CreateProductRequest) returns (ProductMessage);
  rpc UpdateProduct(UpdateProductRequest) returns (ProductMessage);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
}

message ProductMessage {
  int64  id          = 1;
  int64  category_id = 2;
  int64  seller_id   = 3;  // 0 means no seller
  string name        = 4;
  string description = 5;
  double price       = 6;
  int32  stock       = 7;
  string image_url   = 8;
  int64  created_at  = 9;
}

message ListProductsRequest {
  string search      = 1;
  int64  category_id = 2;  // 0 means all categories
  double min_price   = 3;
  double max_price   = 4;
  int32  page        = 5;
  int32  limit       = 6;
}

message ListProductsResponse {
  repeated ProductMessage products = 1;
  int32                   total    = 2;
  int32                   page     = 3;
  int32                   limit    = 4;
}

message GetProductRequest {
  int64 id = 1;
}

message CreateProductRequest {
  int64  category_id = 1;
  string name        = 2;
  string description = 3;
  double price       = 4;
  int32  stock       = 5;
  string image_url   = 6;
}

message UpdateProductRequest {
  int64  id          = 1;
  string name        = 2;
  string description = 3;
  double price       = 4;
  int32  stock       = 5;
  string image_url   = 6;
}

message DeleteProductRequest {
  int64 id = 1;
}

message DeleteProductResponse {}

message CategoryMessage {
  int64  id         = 1;
  string name       = 2;
  string slug       = 3;
  int64  created_at = 4;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated CategoryMessage categories = 1;
}
